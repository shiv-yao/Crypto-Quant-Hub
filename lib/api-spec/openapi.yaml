openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Crypto Quant Trading System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: strategies
  - name: backtests
  - name: paper-trading
  - name: risk
  - name: trades
  - name: market
  - name: settings
  - name: exchange
  - name: audit-logs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /strategies:
    get:
      operationId: listStrategies
      tags: [strategies]
      summary: List all strategies
      responses:
        "200":
          description: List of strategies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strategy"
    post:
      operationId: createStrategy
      tags: [strategies]
      summary: Create a new strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"

  /strategies/{id}:
    get:
      operationId: getStrategy
      tags: [strategies]
      summary: Get a strategy by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Strategy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
        "404":
          description: Not found
    patch:
      operationId: updateStrategy
      tags: [strategies]
      summary: Update a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
    delete:
      operationId: deleteStrategy
      tags: [strategies]
      summary: Delete a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /backtests:
    get:
      operationId: listBacktests
      tags: [backtests]
      summary: List all backtest results
      responses:
        "200":
          description: List of backtest results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BacktestResult"
    post:
      operationId: runBacktest
      tags: [backtests]
      summary: Run a backtest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestInput"
      responses:
        "201":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"

  /backtests/{id}:
    get:
      operationId: getBacktest
      tags: [backtests]
      summary: Get backtest result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Backtest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"

  /paper-trading/positions:
    get:
      operationId: listPositions
      tags: [paper-trading]
      summary: List current paper trading positions
      responses:
        "200":
          description: Positions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /paper-trading/orders:
    get:
      operationId: listOrders
      tags: [paper-trading]
      summary: List paper trading orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /paper-trading/summary:
    get:
      operationId: getPaperTradingSummary
      tags: [paper-trading]
      summary: Get paper trading account summary
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperTradingSummary"

  /paper-trading/strategies/{id}/toggle:
    post:
      operationId: toggleStrategyExecution
      tags: [paper-trading]
      summary: Pause or resume a running strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated execution status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyExecution"

  /risk:
    get:
      operationId: getRiskSettings
      tags: [risk]
      summary: Get current risk management settings
      responses:
        "200":
          description: Risk settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSettings"
    patch:
      operationId: updateRiskSettings
      tags: [risk]
      summary: Update risk management settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSettings"

  /risk/emergency-stop:
    post:
      operationId: triggerEmergencyStop
      tags: [risk]
      summary: Trigger emergency stop - halt all strategies
      responses:
        "200":
          description: Emergency stop triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyStopResult"

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List trade history records
      responses:
        "200":
          description: Trade records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeRecord"

  /market/summary:
    get:
      operationId: getMarketSummary
      tags: [market]
      summary: Get market data (real Binance if connected, else demo)
      responses:
        "200":
          description: Market summary with source info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSummaryResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [market]
      summary: Get dashboard overview statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get system settings
      responses:
        "200":
          description: System settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"

  /exchange/status:
    get:
      operationId: getExchangeStatus
      tags: [exchange]
      summary: Get exchange connection status
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeStatus"

  /exchange/config:
    post:
      operationId: saveExchangeConfig
      tags: [exchange]
      summary: Save API keys (server-side only, never returned)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeConfigInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleSuccess"

  /exchange/test-connection:
    post:
      operationId: testExchangeConnection
      tags: [exchange]
      summary: Test API key connectivity
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /exchange/account:
    get:
      operationId: getExchangeAccount
      tags: [exchange]
      summary: Get real account balances
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeAccount"

  /exchange/pairs:
    get:
      operationId: getExchangePairs
      tags: [exchange]
      summary: Get available trading pairs with precision info
      responses:
        "200":
          description: Trading pairs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradingPair"

  /exchange/klines:
    get:
      operationId: getKlines
      tags: [exchange]
      summary: Get OHLCV kline data
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: interval
          in: query
          schema:
            type: string
            default: "1h"
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Kline data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KlineResponse"

  /exchange/place-order:
    post:
      operationId: placeOrder
      tags: [exchange]
      summary: Place an order (paper/testnet/live)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderInput"
      responses:
        "200":
          description: Order result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceOrderResult"

  /exchange/orders:
    get:
      operationId: getExchangeOrders
      tags: [exchange]
      summary: List open orders from exchange
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Open orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExchangeOrder"

  /exchange/orders/{orderId}:
    delete:
      operationId: cancelExchangeOrder
      tags: [exchange]
      summary: Cancel an open order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleSuccess"

  /exchange/enable-live:
    post:
      operationId: enableLiveTrading
      tags: [exchange]
      summary: Enable live trading after all safety checks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnableLiveInput"
      responses:
        "200":
          description: Live trading enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleSuccess"

  /exchange/disable-live:
    post:
      operationId: disableLiveTrading
      tags: [exchange]
      summary: Disable live trading, revert to paper mode
      responses:
        "200":
          description: Disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleSuccess"

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit-logs]
      summary: List audit log entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Strategy:
      type: object
      required: [id, name, type, symbol, interval, params, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [ma_crossover, rsi, bollinger, grid]
        symbol:
          type: string
        interval:
          type: string
        params:
          type: object
          additionalProperties: true
        isActive:
          type: boolean
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    StrategyInput:
      type: object
      required: [name, type, symbol, interval, params]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [ma_crossover, rsi, bollinger, grid]
        symbol:
          type: string
        interval:
          type: string
        params:
          type: object
          additionalProperties: true
        description:
          type: string

    StrategyUpdate:
      type: object
      properties:
        name:
          type: string
        symbol:
          type: string
        interval:
          type: string
        params:
          type: object
          additionalProperties: true
        isActive:
          type: boolean
        description:
          type: string

    BacktestResult:
      type: object
      required: [id, strategyId, strategyName, symbol, interval, startDate, endDate, initialCapital, finalCapital, totalReturn, annualizedReturn, maxDrawdown, winRate, profitFactor, totalTrades, status, createdAt]
      properties:
        id:
          type: integer
        strategyId:
          type: integer
        strategyName:
          type: string
        symbol:
          type: string
        interval:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        initialCapital:
          type: number
        finalCapital:
          type: number
        totalReturn:
          type: number
        annualizedReturn:
          type: number
        maxDrawdown:
          type: number
        winRate:
          type: number
        profitFactor:
          type: number
        totalTrades:
          type: integer
        status:
          type: string
          enum: [pending, running, completed, failed]
        equityCurve:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/EquityPoint"
        trades:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/BacktestTrade"
        createdAt:
          type: string

    BacktestInput:
      type: object
      required: [strategyId, startDate, endDate, initialCapital]
      properties:
        strategyId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        initialCapital:
          type: number

    EquityPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
        value:
          type: number

    BacktestTrade:
      type: object
      required: [id, side, entryPrice, exitPrice, entryDate, exitDate, pnl, pnlPct]
      properties:
        id:
          type: integer
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: number
        entryDate:
          type: string
        exitDate:
          type: string
        pnl:
          type: number
        pnlPct:
          type: number

    Position:
      type: object
      required: [id, symbol, side, size, entryPrice, currentPrice, unrealizedPnl, unrealizedPnlPct, strategyName, openedAt]
      properties:
        id:
          type: integer
        symbol:
          type: string
        side:
          type: string
          enum: [long, short]
        size:
          type: number
        entryPrice:
          type: number
        currentPrice:
          type: number
        unrealizedPnl:
          type: number
        unrealizedPnlPct:
          type: number
        strategyName:
          type: string
        openedAt:
          type: string

    Order:
      type: object
      required: [id, symbol, side, type, size, price, status, strategyName, createdAt]
      properties:
        id:
          type: integer
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [market, limit, stop]
        size:
          type: number
        price:
          type: number
        status:
          type: string
          enum: [pending, filled, cancelled, rejected]
        strategyName:
          type: string
        createdAt:
          type: string

    PaperTradingSummary:
      type: object
      required: [totalEquity, availableBalance, totalUnrealizedPnl, totalRealizedPnl, totalTrades, winRate, activeStrategies]
      properties:
        totalEquity:
          type: number
        availableBalance:
          type: number
        totalUnrealizedPnl:
          type: number
        totalRealizedPnl:
          type: number
        totalTrades:
          type: integer
        winRate:
          type: number
        activeStrategies:
          type: integer

    StrategyExecution:
      type: object
      required: [strategyId, isRunning]
      properties:
        strategyId:
          type: integer
        isRunning:
          type: boolean

    RiskSettings:
      type: object
      required: [id, maxPositionSizePct, maxDailyLossPct, maxLeverage, maxOpenPositions, stopLossPct, takeProfitPct, trailingStopPct, trailingStopEnabled, emergencyStopEnabled, maxSingleOrderUsdt, maxTotalExposureUsdt, maxConsecutiveLosses, allowedSymbols, updatedAt]
      properties:
        id:
          type: integer
        maxPositionSizePct:
          type: number
        maxDailyLossPct:
          type: number
        maxLeverage:
          type: number
        maxOpenPositions:
          type: integer
        stopLossPct:
          type: number
        takeProfitPct:
          type: number
        trailingStopPct:
          type: number
        trailingStopEnabled:
          type: boolean
        emergencyStopEnabled:
          type: boolean
        maxSingleOrderUsdt:
          type: number
        maxTotalExposureUsdt:
          type: number
        maxConsecutiveLosses:
          type: integer
        allowedSymbols:
          type: array
          items:
            type: string
        updatedAt:
          type: string

    RiskSettingsUpdate:
      type: object
      properties:
        maxPositionSizePct:
          type: number
        maxDailyLossPct:
          type: number
        maxLeverage:
          type: number
        maxOpenPositions:
          type: integer
        stopLossPct:
          type: number
        takeProfitPct:
          type: number
        trailingStopPct:
          type: number
        trailingStopEnabled:
          type: boolean
        emergencyStopEnabled:
          type: boolean
        maxSingleOrderUsdt:
          type: number
        maxTotalExposureUsdt:
          type: number
        maxConsecutiveLosses:
          type: integer
        allowedSymbols:
          type: array
          items:
            type: string

    EmergencyStopResult:
      type: object
      required: [success, stoppedStrategies, message]
      properties:
        success:
          type: boolean
        stoppedStrategies:
          type: integer
        message:
          type: string

    TradeRecord:
      type: object
      required: [id, symbol, side, size, price, fee, pnl, pnlPct, strategyName, executedAt, mode]
      properties:
        id:
          type: integer
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        size:
          type: number
        price:
          type: number
        fee:
          type: number
        pnl:
          type: number
        pnlPct:
          type: number
        strategyName:
          type: string
        executedAt:
          type: string
        mode:
          type: string
          enum: [paper, testnet, live]
        orderSource:
          type: string
          enum: [manual, strategy]
        exchangeOrderId:
          type: ["string", "null"]

    MarketSummaryResponse:
      type: object
      required: [source, lastUpdated, data]
      properties:
        source:
          type: string
          enum: [demo, binance_public, binance_testnet, binance_live]
        lastUpdated:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/MarketTicker"

    MarketTicker:
      type: object
      required: [symbol, price, change24h, changePct24h, volume24h, high24h, low24h]
      properties:
        symbol:
          type: string
        price:
          type: number
        change24h:
          type: number
        changePct24h:
          type: number
        volume24h:
          type: number
        high24h:
          type: number
        low24h:
          type: number

    DashboardStats:
      type: object
      required: [totalStrategies, activeStrategies, totalBacktests, totalTrades, paperTradingPnl, paperTradingPnlPct, systemMode, recentActivity]
      properties:
        totalStrategies:
          type: integer
        activeStrategies:
          type: integer
        totalBacktests:
          type: integer
        totalTrades:
          type: integer
        paperTradingPnl:
          type: number
        paperTradingPnlPct:
          type: number
        systemMode:
          type: string
          enum: [paper, live]
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ActivityItem:
      type: object
      required: [id, type, description, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        timestamp:
          type: string

    SystemSettings:
      type: object
      required: [id, mode, exchangeName, networkMode, apiKeySet, tradingEnabled, liveReadyStep, connectionStatus, updatedAt]
      properties:
        id:
          type: integer
        mode:
          type: string
          enum: [paper, live]
        exchangeName:
          type: string
        networkMode:
          type: string
          enum: [mainnet, testnet]
        apiKeySet:
          type: boolean
        tradingEnabled:
          type: boolean
        liveReadyStep:
          type: integer
        connectionStatus:
          type: string
          enum: [disconnected, connecting, connected, error]
        connectionError:
          type: ["string", "null"]
        lastConnectedAt:
          type: ["string", "null"]
        updatedAt:
          type: string

    SystemSettingsUpdate:
      type: object
      properties:
        mode:
          type: string
          enum: [paper, live]
        exchangeName:
          type: string
        networkMode:
          type: string
          enum: [mainnet, testnet]

    ExchangeStatus:
      type: object
      required: [exchange, networkMode, isConnected, apiKeySet, systemMode, liveReadyStep, tradingEnabled]
      properties:
        exchange:
          type: string
        networkMode:
          type: string
        isConnected:
          type: boolean
        apiKeySet:
          type: boolean
        lastTestedAt:
          type: ["string", "null"]
        connectionError:
          type: ["string", "null"]
        systemMode:
          type: string
        liveReadyStep:
          type: integer
        tradingEnabled:
          type: boolean

    ExchangeConfigInput:
      type: object
      required: [apiKey, apiSecret]
      properties:
        apiKey:
          type: string
        apiSecret:
          type: string
        networkMode:
          type: string
          enum: [mainnet, testnet]
          default: testnet
        exchange:
          type: string
          default: Binance

    ConnectionTestResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        canTrade:
          type: boolean
        canWithdraw:
          type: boolean
        accountType:
          type: string
        networkMode:
          type: string
        serverTime:
          type: number
        usdtBalance:
          type: string
        error:
          type: string

    ExchangeAccount:
      type: object
      required: [canTrade, canWithdraw, accountType, balances, networkMode, lastUpdated]
      properties:
        canTrade:
          type: boolean
        canWithdraw:
          type: boolean
        accountType:
          type: string
        networkMode:
          type: string
        lastUpdated:
          type: string
        balances:
          type: array
          items:
            $ref: "#/components/schemas/AssetBalance"

    AssetBalance:
      type: object
      required: [asset, free, locked, total]
      properties:
        asset:
          type: string
        free:
          type: number
        locked:
          type: number
        total:
          type: number

    TradingPair:
      type: object
      required: [symbol, baseAsset, quoteAsset, minQty, maxQty, stepSize, tickSize, minNotional]
      properties:
        symbol:
          type: string
        baseAsset:
          type: string
        quoteAsset:
          type: string
        minQty:
          type: string
        maxQty:
          type: string
        stepSize:
          type: string
        tickSize:
          type: string
        minNotional:
          type: string

    KlineResponse:
      type: object
      required: [symbol, interval, source, data]
      properties:
        symbol:
          type: string
        interval:
          type: string
        source:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/Kline"

    Kline:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    PlaceOrderInput:
      type: object
      required: [symbol, side, type, quantity]
      properties:
        symbol:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        type:
          type: string
          enum: [MARKET, LIMIT]
        quantity:
          type: number
        price:
          type: number
        source:
          type: string
          enum: [manual, strategy]
          default: manual
        strategyName:
          type: string
        confirmLive:
          type: boolean

    PlaceOrderResult:
      type: object
      required: [orderId, symbol, side, type, quantity, status, mode]
      properties:
        orderId:
          type: integer
        symbol:
          type: string
        side:
          type: string
        type:
          type: string
        quantity:
          type: number
        executedQty:
          type: number
        price:
          type: number
        status:
          type: string
        mode:
          type: string
        warnings:
          type: array
          items:
            type: string
        message:
          type: string
        fills:
          type: array
          items:
            type: object
            additionalProperties: true

    ExchangeOrder:
      type: object
      required: [orderId, symbol, side, type, origQty, executedQty, price, status, time]
      properties:
        orderId:
          type: integer
        symbol:
          type: string
        side:
          type: string
        type:
          type: string
        origQty:
          type: number
        executedQty:
          type: number
        price:
          type: number
        status:
          type: string
        time:
          type: string

    EnableLiveInput:
      type: object
      required: [confirmText, riskAgreed, noWithdrawConfirmed]
      properties:
        confirmText:
          type: string
        riskAgreed:
          type: boolean
        noWithdrawConfirmed:
          type: boolean

    SimpleSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string

    AuditLog:
      type: object
      required: [id, action, mode, source, result, createdAt]
      properties:
        id:
          type: integer
        action:
          type: string
        details:
          type: object
          additionalProperties: true
        mode:
          type: string
        source:
          type: string
        result:
          type: string
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
